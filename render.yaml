services:
  - type: web
    name: shared-calendar
    env: node
    plan: free
    buildCommand: cd backend && npm install && cd ../frontend && npm install --include=dev && npm run build
    startCommand: node backend/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_EXPIRES_DAYS
        value: "90"
