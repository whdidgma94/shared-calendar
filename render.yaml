services:
  - type: web
    name: shared-calendar
    env: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --include=dev --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/app.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_EXPIRES_DAYS
        value: "90"
